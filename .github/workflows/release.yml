name: Build and Release Electron App

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

# Never run two releases for the same ref at once, and never cancel an in-progress
# release (cancelling mid-publish could leave a half-uploaded GitHub release).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      upload_artifacts: true
    secrets: inherit

  release:
    needs: [build]
    runs-on: ubuntu-latest
    # Publish a GitHub release for tag pushes. Manual runs still stay artifact-only.
    if: github.ref_type == 'tag'
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Detect release type
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-preview.* ]]; then
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          if [[ "${{ steps.release_meta.outputs.is_preview }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release delete "${{ github.ref_name }}" --yes >/dev/null 2>&1 || true
          gh release create "${{ github.ref_name }}" \
            --title "VidBee ${{ github.ref_name }}" \
            --notes "Automated release for ${{ github.ref_name }}" \
            $prerelease_flag

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for file in dist/*; do
            if [[ -f "$file" ]]; then
              echo "Uploading $file"
              gh release upload "${{ github.ref_name }}" "$file" --clobber
            fi
          done

      - name: Notify Cloudflare Pages
        if: steps.release_meta.outputs.is_preview != 'true'
        env:
          CLOUDFLARE_WEBHOOK_URL: ${{ secrets.CLOUDFLARE_WEBHOOK_URL }}
        run: |
          curl -X POST "$CLOUDFLARE_WEBHOOK_URL"
