name: Build and Release Electron App

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release from the built artifacts'
        required: false
        type: boolean
        default: true

# Never run two releases for the same ref at once, and never cancel an in-progress
# release (cancelling mid-publish could leave a half-uploaded GitHub release).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      upload_artifacts: true
      release_version: ${{ github.ref_name }}
    secrets: inherit

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Publish a GitHub release for tag pushes and for manual runs when explicitly enabled.
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Detect release type
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-preview.* ]]; then
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: VidBee-*
          merge-multiple: true
          path: dist/

      - name: Validate downloaded assets
        shell: bash
        run: |
          set -euo pipefail
          if ! find dist -maxdepth 1 -type f | grep -q .; then
            echo "::error::No release artifacts were downloaded from the build job."
            exit 1
          fi
          echo "Downloaded files:"
          find dist -maxdepth 1 -type f | sort

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_IS_PREVIEW: ${{ steps.release_meta.outputs.is_preview }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          tag = os.environ['GITHUB_REF_NAME']
          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']
          is_preview = os.environ.get('RELEASE_IS_PREVIEW', 'false')
          prerelease = is_preview.lower() == 'true'
          url = f'https://api.github.com/repos/{repo}/releases'
          body = {
              'tag_name': tag,
              'target_commitish': os.environ.get('GITHUB_SHA', ''),
              'name': f'VidBee {tag}',
              'body': f'Automated release for {tag}',
              'prerelease': prerelease,
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(body).encode('utf-8'),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as exc:
              print(exc.read().decode('utf-8'), file=sys.stderr)
              raise
          PY

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys
          import urllib.request
          import urllib.parse
          import json
          from pathlib import Path

          tag = os.environ['GITHUB_REF_NAME']
          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']

          release_url = f'https://api.github.com/repos/{repo}/releases/tags/{urllib.parse.quote(tag)}'
          req = urllib.request.Request(
              release_url,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(req) as resp:
              release = json.load(resp)

          upload_url = release['upload_url'].split('{')[0]
          for path in sorted(Path('dist').iterdir()):
              if not path.is_file():
                  continue
              print(f'Uploading {path.name}')
              with path.open('rb') as fh:
                  data = fh.read()
              headers = {
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/octet-stream',
              }
              req = urllib.request.Request(
                  f'{upload_url}?name={urllib.parse.quote(path.name)}',
                  data=data,
                  headers=headers,
                  method='POST',
              )
              with urllib.request.urlopen(req) as resp:
                  print(resp.status)
          PY

      - name: Notify Cloudflare Pages
        if: steps.release_meta.outputs.is_preview != 'true'
        env:
          CLOUDFLARE_WEBHOOK_URL: ${{ secrets.CLOUDFLARE_WEBHOOK_URL }}
        run: |
          curl -X POST "$CLOUDFLARE_WEBHOOK_URL"
